<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ff3d77">
<title>Любишь Тому? 💘</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:"Nunito","Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#fff0f4,#ffd9e6 40%,#ffe0ec);
    color:#46202f;
    display:flex;align-items:center;justify-content:center;
    min-height:100%;padding:24px;position:relative;
  }
  .blob{position:fixed;border-radius:50%;filter:blur(8px);opacity:.55;z-index:0;}
  .b1{width:190px;height:190px;background:#ff9fc0;top:-50px;left:-40px;}
  .b2{width:230px;height:230px;background:#ff7aa8;bottom:-70px;right:-50px;}

  /* переключатель режимов (временный, для выбора) */
  .modes{
    position:fixed;top:calc(8px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:10;display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(255,255,255,.82);backdrop-filter:blur(6px);
    border-radius:999px;padding:6px 8px;box-shadow:0 8px 20px rgba(220,60,120,.18);max-width:96vw;
  }
  .mlabel{font-size:11px;font-weight:800;color:#b56e89;padding:0 4px;}
  .mode{
    border:none;background:#fff;border-radius:999px;padding:7px 11px;
    font-family:inherit;font-weight:800;font-size:12px;cursor:pointer;color:#a9899a;
    transition:background .15s,color .15s,transform .1s;
  }
  .mode:active{transform:scale(.92);}
  .mode.active{background:#ff2e6e;color:#fff;}

  .card{
    position:relative;z-index:2;
    background:rgba(255,255,255,.85);backdrop-filter:blur(6px);
    border-radius:32px;padding:36px 26px 30px;text-align:center;
    max-width:440px;width:100%;box-shadow:0 20px 50px rgba(220,60,120,.25);
  }
  .emoji{font-size:64px;line-height:1;margin-bottom:10px;animation:bob 2.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg) scale(1)}50%{transform:translateY(-10px) rotate(5deg) scale(1.06)}}
  h1{font-size:30px;font-weight:900;letter-spacing:-.5px;line-height:1.15;margin-bottom:10px;}
  h1 .hl{color:#ff2e6e;}
  .sub{font-size:15px;font-weight:800;color:#b56e89;margin-bottom:28px;}

  .btns{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;}
  .btn{
    border:none;cursor:pointer;font-family:inherit;
    font-size:19px;font-weight:900;border-radius:18px;padding:15px 32px;transition:transform .12s;
  }
  .btn:active{transform:scale(.95);}
  .yes{background:linear-gradient(135deg,#ff7aa8,#ff2e6e);color:#fff;box-shadow:0 10px 22px rgba(255,46,110,.42);}
  .yes:hover{transform:scale(1.07) rotate(-1deg);}
  .no{background:#fff;color:#a9899a;border:2px solid #f3dde6;will-change:left,top;}

  /* бегущие ответы-отговорки */
  .reaction{
    position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%);
    z-index:8;background:#fff;color:#ff2e6e;font-weight:900;font-size:15px;
    padding:12px 20px;border-radius:999px;box-shadow:0 10px 26px rgba(255,46,110,.3);
    opacity:0;pointer-events:none;max-width:92vw;text-align:center;transition:opacity .2s;
  }
  .reaction.show{opacity:1;}
  .reaction.pop{animation:rpop .26s cubic-bezier(.3,1.6,.5,1);}
  @keyframes rpop{0%{transform:translateX(-50%) scale(.72)}100%{transform:translateX(-50%) scale(1)}}

  .win{display:none;position:relative;z-index:2;text-align:center;max-width:440px;}
  .win.show{display:block;animation:pop .5s cubic-bezier(.3,1.5,.5,1);}
  @keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .win .emoji{font-size:84px;animation:none;margin-bottom:6px;}
  .win h2{font-size:32px;font-weight:900;color:#ff2e6e;margin-bottom:10px;line-height:1.12;}
  .win p{font-size:18px;font-weight:800;color:#7a4a5e;line-height:1.5;}

  .confetti{position:fixed;top:-40px;z-index:5;font-size:24px;pointer-events:none;will-change:transform;}
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="modes" id="modes">
    <span class="mlabel">«Нет»:</span>
    <button class="mode active" data-m="slide">🐢 плавно</button>
    <button class="mode" data-m="teleport">⚡ телепорт</button>
  </div>

  <div class="card" id="card">
    <div class="emoji">💘</div>
    <h1>Любишь <span class="hl">Тому</span>?</h1>
    <div class="sub">Только честно 👀💕</div>
    <div class="btns">
      <button class="btn yes" id="yes">Да 🥰</button>
      <button class="btn no" id="no">Нет</button>
    </div>
  </div>

  <div class="reaction" id="reaction"></div>

  <div class="win" id="win">
    <div class="emoji">🥰💘</div>
    <h2>Так и знали!</h2>
    <p>Любовь не спрятать 💕<br>Тому не разлюбить ❤️</p>
  </div>

<script>
(function(){
  "use strict";
  var no   = document.getElementById("no");
  var yes  = document.getElementById("yes");
  var card = document.getElementById("card");
  var win  = document.getElementById("win");
  var reaction = document.getElementById("reaction");

  var phrases = [
    "Неа, даже не пытайся 😜",
    "Кнопка «Нет» сломалась 🤷‍♀️",
    "Поздно — мы всё видели 👀",
    "От любви не убежишь 💘",
    "Лови, если сможешь 🏃‍♀️💨",
    "Сердце не обманешь 💞",
    "Ну жми же «Да» 😄",
    "Я быстрее тебя 💨",
    "Опять мимо 😆",
    "Тут только «Да» 💕"
  ];
  var i = -1;
  var mode = "slide";        // slide | teleport
  var fixedOn = false;
  var x = 0, y = 0;

  function setTransition(){
    no.style.transition = (mode === "slide")
      ? "left .30s cubic-bezier(.2,.85,.3,1), top .30s cubic-bezier(.2,.85,.3,1), transform .12s"
      : "left .12s ease, top .12s ease, transform .12s";
  }
  function react(){
    i = (i + 1) % phrases.length;
    reaction.textContent = phrases[i];
    reaction.classList.add("show");
    reaction.classList.remove("pop"); void reaction.offsetWidth; reaction.classList.add("pop");
  }

  // безопасная зона строго в пределах экрана
  function bounds(){
    var bw = no.offsetWidth, bh = no.offsetHeight;
    var padX = 12, topGap = 58, botGap = 78; // сверху не лезем под панель, снизу — под плашку ответов
    return {
      bw:bw, bh:bh,
      minX:padX, maxX: Math.max(padX, window.innerWidth  - bw - padX),
      minY:topGap, maxY: Math.max(topGap, window.innerHeight - bh - botGap)
    };
  }
  function ensureFixed(){
    if(fixedOn) return;
    var r = no.getBoundingClientRect();
    x = r.left; y = r.top;
    no.style.position = "fixed"; no.style.margin = "0";
    no.style.left = x + "px"; no.style.top = y + "px";
    fixedOn = true;
  }
  function put(){ no.style.left = x + "px"; no.style.top = y + "px"; }
  function center(){
    if(fixedOn) return {x:x + no.offsetWidth/2, y:y + no.offsetHeight/2};
    var r = no.getBoundingClientRect(); return {x:r.left + r.width/2, y:r.top + r.height/2};
  }
  function dist(ax,ay,bx,by){ var dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }

  function randSpot(awayX, awayY){
    var b = bounds(), nx, ny, t = 0;
    do{
      nx = b.minX + Math.random() * (b.maxX - b.minX);
      ny = b.minY + Math.random() * (b.maxY - b.minY);
      t++;
    } while(dist(nx + b.bw/2, ny + b.bh/2, awayX, awayY) < 170 && t < 14);
    return {x:nx, y:ny};
  }

  function teleport(awayX, awayY){
    ensureFixed();
    var p = randSpot(awayX, awayY);
    x = p.x; y = p.y; put(); react();
  }

  function dodge(px, py, step){
    ensureFixed();
    var b = bounds();
    var c = center();
    var dx = c.x - px, dy = c.y - py, d = Math.sqrt(dx*dx + dy*dy) || 1;
    var nx = x + (dx/d) * step;
    var ny = y + (dy/d) * step;
    // строго в пределах экрана
    nx = Math.max(b.minX, Math.min(nx, b.maxX));
    ny = Math.max(b.minY, Math.min(ny, b.maxY));
    // если у стенки и палец/курсор близко — прыжок в случайную точку (тоже в экране)
    if(dist(nx + b.bw/2, ny + b.bh/2, px, py) < 95){
      var p = randSpot(px, py); nx = p.x; ny = p.y;
    }
    x = nx; y = ny; put(); react();
  }

  // десктоп: реагируем на приближение курсора
  document.addEventListener("mousemove", function(e){
    if(win.classList.contains("show")) return;
    var c = center();
    if(dist(c.x, c.y, e.clientX, e.clientY) < 115){
      if(mode === "teleport") teleport(e.clientX, e.clientY);
      else dodge(e.clientX, e.clientY, 150);
    }
  });

  // телефон: уворачивается от касания
  no.addEventListener("touchstart", function(e){
    e.preventDefault();
    var t = e.touches[0];
    if(mode === "teleport") teleport(t.clientX, t.clientY);
    else dodge(t.clientX, t.clientY, 175);
  }, {passive:false});
  no.addEventListener("click", function(e){ e.preventDefault(); });

  // не вылезать за экран при повороте/изменении размера
  window.addEventListener("resize", function(){
    if(!fixedOn) return;
    var b = bounds();
    x = Math.max(b.minX, Math.min(x, b.maxX));
    y = Math.max(b.minY, Math.min(y, b.maxY));
    put();
  });

  // переключатель режимов
  document.getElementById("modes").addEventListener("click", function(e){
    var btn = e.target.closest(".mode"); if(!btn) return;
    mode = btn.getAttribute("data-m");
    [].forEach.call(document.querySelectorAll(".mode"), function(m){ m.classList.toggle("active", m === btn); });
    // сброс на место
    fixedOn = false; i = -1;
    no.style.position = ""; no.style.left = ""; no.style.top = ""; no.style.margin = "";
    reaction.classList.remove("show");
    setTransition();
  });

  // "Да"
  yes.addEventListener("click", function(){
    card.style.display = "none";
    no.style.display = "none";
    reaction.classList.remove("show");
    document.getElementById("modes").style.display = "none";
    win.classList.add("show");
    burst();
  });

  function burst(){
    var emojis = ["❤️","💖","💕","😍","🥰","💘","💞","✨","🩷"];
    for(var n=0; n<54; n++){
      (function(){
        var c = document.createElement("div");
        c.className = "confetti";
        c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        c.style.left = (Math.random()*100) + "vw";
        c.style.fontSize = (18 + Math.random()*22) + "px";
        document.body.appendChild(c);
        var dur = 2200 + Math.random()*1800;
        var drift = (Math.random()*160 - 80);
        var rot = (Math.random()*720 - 360);
        c.animate([
          {transform:"translate(0,0) rotate(0deg)", opacity:1},
          {transform:"translate("+drift+"px,"+(window.innerHeight+120)+"px) rotate("+rot+"deg)", opacity:1}
        ], {duration:dur, easing:"cubic-bezier(.2,.6,.5,1)"});
        setTimeout(function(){ c.remove(); }, dur);
      })();
    }
  }

  setTransition();
})();
</script>
</body>
</html>
